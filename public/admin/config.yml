backend:
  name: github
  repo: d9pe/d9pe.github.io
  branch: main
  base_url: https://classy-palmier-0bbc7f.netlify.app
  auth_endpoint: /.netlify/identity

media_folder: public/content-images
public_folder: /content-images

collections:
  - name: caseStudies
    label: Case Studies
    label_singular: Case Study
    folder: src/data/caseStudies
    create: true
    delete: true
    format: json
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Titel, name: title, widget: string }
      - { label: Sektor, name: sector, widget: string }
      - { label: Inhalt, name: content, widget: text }
      - { label: Link, name: case_study_link, widget: string }
      - { label: CTA, name: cta, widget: string }
      - { label: Bild, name: image, widget: image }
      - { label: Bild Alt, name: image_alt, widget: string }
      - { label: Hintergrund, name: bg, widget: string }

  - name: faq
    label: FAQ
    files:
      - label: FAQ
        name: faq
        file: src/data/faq.json
        fields:
          - label: Eintraege
            name: items
            widget: list
            fields:
              - { label: Frage, name: question, widget: string }
              - { label: Antwort, name: answer, widget: text }

  - name: services
    label: Services
    files:
      - label: Services
        name: services
        file: src/data/services.json
        fields:
          - label: Services
            name: items
            widget: list
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Beschreibung, name: description, widget: text }

  - name: testimonials
    label: Testimonials
    files:
      - label: Testimonials
        name: testimonials
        file: src/data/testimonials.json
        fields:
          - label: Testimonials
            name: items
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Rolle, name: role, widget: string }
              - { label: Zitat, name: quote, widget: text }
              - { label: Bild, name: image, widget: image, required: false }

  - name: pricing
    label: Pricing
    files:
      - label: Pricing
        name: pricing
        file: src/data/pricing.json
        fields:
          - label: Pakete
            name: items
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Preis, name: price, widget: string }
              - { label: Beschreibung, name: description, widget: text }

  - name: clients
    label: Clients
    files:
      - label: Clients
        name: clients
        file: src/data/clients.json
        fields:
          - label: Clients
            name: items
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Logo, name: logo, widget: image, required: false }
              - { label: URL, name: url, widget: string, required: false }

  - name: global_settings
    label: Global Settings
    files:
      - label: Global Settings
        name: global_settings
        file: src/data/global_settings.json
        fields:
          - { label: Site Name, name: site_name, widget: string }
          - { label: E-Mail, name: email, widget: string, required: false }

  - name: impressum
    label: Impressum
    files:
      - label: Impressum
        name: impressum
        file: src/data/impressum.json
        fields:
          - { label: Inhalt, name: content, widget: markdown }