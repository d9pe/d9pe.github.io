backend:
  name: git-gateway
  branch: main

media_folder: public/content-images
public_folder: /content-images

collections:
  # Seiten (Markdown)
  - name: pages
    label: Seiten
    label_singular: Seite
    folder: src/content/pages
    create: true
    delete: true
    format: frontmatter
    extension: md
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschreibung, name: description, widget: text, required: false }
      - { label: Inhalt, name: body, widget: markdown }

  # Case Studies
  - name: caseStudies
    label: Case Studies
    label_singular: Case Study
    folder: src/data/caseStudies
    create: true
    delete: true
    format: json
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Titel, name: title, widget: string }
      - { label: Sektor, name: sector, widget: string }
      - { label: Inhalt, name: content, widget: text }
      - { label: Link, name: case_study_link, widget: string }
      - { label: CTA, name: cta, widget: string }
      - { label: Bild, name: image, widget: image }
      - { label: Bild Alt, name: image_alt, widget: string }
      - { label: Hintergrund, name: bg, widget: string }

  # FAQ
  - name: faq
    label: FAQ
    label_singular: FAQ Eintrag
    folder: src/content/faq
    create: true
    delete: true
    format: json
    fields:
      - { label: Frage, name: question, widget: string }
      - { label: Antwort, name: answer, widget: text }

  # Services
  - name: services
    label: Services
    label_singular: Service
    folder: src/content/services
    create: true
    delete: true
    format: json
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Inhalt, name: content, widget: text }
      - { label: CTA, name: cta, widget: string }
      - { label: Bild, name: image, widget: image }
      - { label: Bild Alt, name: image_alt, widget: string }

  # Testimonials
  - name: testimonials
    label: Testimonials
    label_singular: Testimonial
    folder: src/content/testimonials
    create: true
    delete: true
    format: json
    fields:
      - { label: Zitat, name: quote, widget: text }
      - { label: Handle, name: handle, widget: string }

  # Clients
  - name: clients
    label: Clients
    label_singular: Client
    folder: src/content/clients
    create: true
    delete: true
    format: json
    fields:
      - { label: Name, name: title, widget: string }
      - { label: Logo, name: image, widget: image }
      - { label: Link, name: link, widget: string }

  # Pricing
  - name: pricing
    label: Pricing
    label_singular: Paket
    folder: src/content/pricing
    create: true
    delete: true
    format: json
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Tag, name: tag, widget: string }
      - { label: Inhalt, name: content, widget: text }
      - { label: CTA, name: cta, widget: string }
      - { label: Preis, name: price, widget: number }
      - label: Leistungen
        name: services
        widget: list
        fields:
          - { label: Punkt, name: item, widget: string }