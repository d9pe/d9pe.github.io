backend:
  name: git-gateway
  branch: main

media_folder: public/content-images
public_folder: /content-images

collections:
  # Case Studies
  - name: caseStudies
    label: Case Studies
    label_singular: Case Study
    folder: src/data/caseStudies
    create: true
    delete: true
    format: json
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Titel, name: title, widget: string }
      - { label: Sektor, name: sector, widget: string }
      - { label: Inhalt, name: content, widget: text }
      - { label: Link, name: case_study_link, widget: string }
      - { label: CTA, name: cta, widget: string }
      - { label: Bild, name: image, widget: image }
      - { label: Bild Alt, name: image_alt, widget: string }
      - { label: Hintergrund, name: bg, widget: string }

  # FAQ
  - name: faq
    label: FAQ
    files:
      - label: FAQ
        name: faq
        file: src/data/faq.json
        fields:
          - label: Eintraege
            name: items
            widget: list
            fields:
              - { label: Frage, name: question, widget: string }
              - { label: Antwort, name: answer, widget: text }

  # Services
  - name: services
    label: Services
    files:
      - label: Services
        name: services
        file: src/data/services.json
        fields:
          - label: Services
            name: items
            widget: list
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Inhalt, name: content, widget: text }
              - { label: CTA, name: cta, widget: string }
              - { label: Bild, name: image, widget: image }
              - { label: Bild Alt, name: image_alt, widget: string }

  # Testimonials
  - name: testimonials
    label: Testimonials
    files:
      - label: Testimonials
        name: testimonials
        file: src/data/testimonials.json
        fields:
          - label: Testimonials
            name: items
            widget: list
            fields:
              - { label: Zitat, name: quote, widget: text }
              - { label: Handle, name: handle, widget: string }

  # Pricing
  - name: pricing
    label: Pricing
    files:
      - label: Pricing
        name: pricing
        file: src/data/pricing.json
        fields:
          - label: Pakete
            name: items
            widget: list
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Tag, name: tag, widget: string }
              - { label: Inhalt, name: content, widget: text }
              - { label: CTA, name: cta, widget: string }
              - { label: Preis, name: price, widget: number }
              - label: Leistungen
                name: services
                widget: list
                fields:
                  - { label: Punkt, name: item, widget: string }

  # Clients
  - name: clients
    label: Clients
    files:
      - label: Clients
        name: clients
        file: src/data/clients.json
        fields:
          - label: Clients
            name: items
            widget: list
            fields:
              - { label: Name, name: title, widget: string }
              - { label: Logo, name: image, widget: image }
              - { label: Link, name: link, widget: string }

  # Global Settings
  - name: global_settings
    label: Global Settings
    files:
      - label: Global Settings
        name: global_settings
        file: src/data/global_settings.json
        fields:
          - { label: Site Name, name: title, widget: string }
          - { label: Beschreibung, name: description, widget: text }
          - { label: Theme Farbe, name: theme_color, widget: color }
          - label: Demo Sektion
            name: demo
            widget: object
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Inhalt, name: content, widget: text }
              - { label: CTA, name: cta, widget: string }
          - label: Navigation
            name: nav
            widget: list
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Link, name: link, widget: string }
          - label: Social Links
            name: social_links
            widget: list
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Link, name: link, widget: string }
              # Impressum
  - name: impressum
    label: Impressum
    files:
      - label: Impressum
        name: impressum
        file: src/data/impressum.json
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Einleitung, name: content, widget: text }
          - label: Liste
            name: list
            widget: list
            fields:
              - { label: Eintrag, name: item, widget: string, hint: "HTML erlaubt" }