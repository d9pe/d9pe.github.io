backend:
  name: github
  repo: d9pe/d9pe.github.io
  branch: main
  base_url: https://classy-palmier-0bbc7f.netlify.app

media_folder: public/content-images
public_folder: /content-images

collections:
  # ——— Case Studies ———
  - name: caseStudies
    label: Case Studies
    label_singular: Case Study
    folder: src/data/caseStudies
    create: true
    delete: true
    format: json
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Titel, name: title, widget: string, hint: "HTML erlaubt, z.B. <br> für Zeilenumbruch" }
      - { label: Sektor, name: sector, widget: string }
      - { label: Inhalt, name: content, widget: text }
      - { label: Case Study Link, name: case_study_link, widget: string }
      - { label: CTA Text, name: cta, widget: string }
      - { label: Bild, name: image, widget: image }
      - { label: Bild Alt-Text, name: image_alt, widget: string }
      - { label: Hintergrund (Tailwind), name: bg, widget: string, hint: "z.B. bg-gradient-to-r from-pink-500 to-yellow-500" }

  # ——— FAQ ———
  - name: faq
    label: FAQ
    files:
      - label: FAQ
        name: faq
        file: src/data/faq.json
        fields:
          - label: FAQ Einträge
            name: items
            widget: list
            fields:
              - { label: Frage, name: question, widget: string }
              - { label: Antwort, name: answer, widget: text }

  # ——— Services ———
  - name: services
    label: Services
    files:
      - label: Services
        name: services
        file: src/data/services.json
        fields:
          - label: Services
            name: items
            widget: list
            fields:
              - { label: Titel, name: title, widget: string }
              - { label: Beschreibung, name: description, widget: text }

  # ——— Testimonials ———
  - name: testimonials
    label: Testimonials
    files:
      - label: Testimonials
        name: testimonials
        file: src/data/testimonials.json
        fields:
          - label: Testimonials
            name: items
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Rolle, name: role, widget: string }
              - { label: Zitat, name: quote, widget: text }
              - { label: Bild, name: image, widget: image, required: false }

  # ——— Pricing ———
  - name: pricing
    label: Pricing
    files:
      - label: Pricing
        name: pricing
        file: src/data/pricing.json
        fields:
          - label: Pakete
            name: items
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Preis, name: price, widget: string }
              - { label: Beschreibung, name: description, widget: text }
              - label: Features
                name: features
                widget: list
                field: { label: Feature, name: feature, widget: string }

  # ——— Clients ———
  - name: clients
    label: Clients
    files:
      - label: Clients
        name: clients
        file: src/data/clients.json
        fields:
          - label: Clients
            name: items
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Logo, name: logo, widget: image, required: false }
              - { label: URL, name: url, widget: string, required: false }

  # ——— Newsletter ———
  - name: newsletter
    label: Newsletter
    files:
      - label: Newsletter
        name: newsletter
        file: src/data/newsletter.json
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Beschreibung, name: description, widget: text }
          - { label: Button Text, name: cta, widget: string }

  # ——— Global Settings ———
  - name: global_settings
    label: Global Settings
    files:
      - label: Global Settings
        name: global_settings
        file: src/data/global_settings.json
        fields:
          - { label: Site Name, name: site_name, widget: string }
          - { label: Tagline, name: tagline, widget: string, required: false }
          - { label: E-Mail, name: email, widget: string, required: false }

  # ——— Impressum ———
  - name: impressum
    label: Impressum
    files:
      - label: Impressum
        name: impressum
        file: src/data/impressum.json
        fields:
          - { label: Inhalt, name: content, widget: markdown }